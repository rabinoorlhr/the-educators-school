<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Educators - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 12px; font-weight: bold; color: white; z-index: 1000; display: none; }
        .login-card { background: white; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    </style>
</head>
<body>

<div id="app" class="min-h-screen">
    <div id="toast-msg" class="toast"></div>

    <div id="login-screen" class="flex items-center justify-center min-h-screen p-6 bg-slate-900">
        <div class="login-card p-8 w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="bg-emerald-600 w-16 h-16 rounded-2xl flex items-center justify-center text-white text-3xl font-black italic mx-auto mb-4">E</div>
                <h1 class="text-2xl font-black tracking-tighter uppercase text-slate-800">Admin Login</h1>
            </div>
            
            <input type="text" id="username" placeholder="Username" class="w-full p-4 mb-3 bg-slate-50 border rounded-xl font-bold outline-none">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 mb-4 bg-slate-50 border rounded-xl font-bold outline-none">
            
            <button onclick="handleLogin()" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-black uppercase tracking-widest mb-3">Login</button>
            
            <button onclick="handleGoogleLogin()" class="w-full bg-white border border-slate-200 text-slate-700 p-4 rounded-xl font-bold uppercase text-xs flex items-center justify-center gap-2 hover:bg-slate-50 transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Continue with Google
            </button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header class="bg-white px-4 py-3 flex justify-between items-center border-b shadow-sm">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-600 p-2 rounded-lg text-white font-black italic">E</div>
                <h2 class="text-sm font-black uppercase">The Educators Portal</h2>
            </div>
            <button onclick="handleLogout()" class="text-[10px] font-black text-red-500 bg-red-50 px-4 py-2 rounded-full border border-red-100 uppercase">Logout</button>
        </header>
        <div class="p-6 text-center font-bold">Welcome to Dashboard!</div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBwkBy_EzDFx6Xd_U7pE6Ud-jC9uL3tKiE",
        authDomain: "theeducator-37df7.firebaseapp.com",
        projectId: "theeducator-37df7",
        storageBucket: "theeducator-37df7.firebasestorage.app",
        messagingSenderId: "650246048269",
        appId: "1:650246048269:web:1f94bf4faaf142849aa344"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Monitor Auth State
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }
    });

    // Google Login Function
    async function handleGoogleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            showToast("Connecting to Google...", "bg-blue-600");
            await auth.signInWithPopup(provider);
            showToast("Logged in successfully!", "bg-emerald-600");
        } catch (error) {
            console.error("Google Auth Error:", error);
            showToast("Login Failed: " + error.message, "bg-red-500");
        }
    }

    // Normal Login
    async function handleLogin() {
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value;
        const email = u.includes('@') ? u : `${u}@school.com`;
        try {
            await auth.signInWithEmailAndPassword(email, p);
        } catch(e) { showToast("Login Error", "bg-red-500"); }
    }

    function handleLogout() { auth.signOut(); }

    function showToast(msg, color) {
        const t = document.getElementById('toast-msg');
        t.innerText = msg;
        t.className = `toast ${color}`;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
</script>
</body>
</html>
