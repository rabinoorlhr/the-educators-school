<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Educators - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1e293b; }
        
        .info-card {
            background: white;
            border-radius: 24px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 14px 20px;
            border-bottom: 1px solid #f1f5f9;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label {
            font-size: 11px;
            font-weight: 800;
            color: #064e3b;
            text-transform: uppercase;
            width: 40%;
            padding-top: 4px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 700;
            color: #0369a1;
            text-align: right;
            width: 60%;
            word-wrap: break-word;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .value-box {
            background: #f0f9ff;
            padding: 6px 12px;
            border-radius: 8px;
            display: inline-block;
            max-width: 100%;
        }

        .search-container {
            background: white;
            padding: 6px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 20px;
        }

        .btn-call { background-color: #0f172a; color: white; }
        .btn-wa { background-color: #059669; color: white; }
        
        .history-item {
            background: #f8fafc;
            padding: 10px;
            border-radius: 12px;
            border-left: 4px solid #10b981;
            margin-bottom: 8px;
        }

        @media (max-width: 400px) {
            .info-label { font-size: 10px; width: 35%; }
            .info-value { font-size: 13px; width: 65%; }
        }
    </style>
</head>
<body>

<div id="app" class="min-h-screen pb-10">
    <!-- Login Section -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen p-6 bg-slate-900">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm">
            <div class="text-center mb-8">
                <div class="bg-emerald-600 w-14 h-14 rounded-2xl flex items-center justify-center text-white text-2xl font-black italic mx-auto mb-2">E</div>
                <h1 class="text-xl font-black tracking-tighter uppercase">Admin Login</h1>
            </div>
            <input type="text" id="username" placeholder="USERNAME" class="w-full p-4 mb-3 bg-slate-50 border rounded-xl font-bold uppercase">
            <input type="password" id="password" placeholder="PASSWORD" class="w-full p-4 mb-4 bg-slate-50 border rounded-xl font-bold">
            <button onclick="handleLogin()" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-black uppercase tracking-widest">Login</button>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard" class="hidden">
        <header class="bg-white px-4 py-3 flex justify-between items-center border-b sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-600 p-2 rounded-lg text-white font-black italic">E</div>
                <div>
                    <h2 class="text-sm font-black leading-none uppercase">The Educators</h2>
                    <span class="text-[8px] font-bold text-emerald-600 uppercase tracking-widest">Management System</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadReport()" class="text-[9px] font-black text-emerald-700 bg-emerald-50 px-3 py-2 rounded-full uppercase">Report</button>
                <button onclick="handleLogout()" class="text-[9px] font-black text-red-500 bg-red-50 px-3 py-2 rounded-full uppercase">Logout</button>
            </div>
        </header>

        <div class="p-4 max-w-md mx-auto">
            <!-- Search -->
            <div class="search-container flex gap-2">
                <input type="number" id="search-input" placeholder="ENTER SR. NO / ID..." class="flex-1 p-3 pl-5 outline-none font-bold text-slate-800 uppercase text-sm">
                <button onclick="performSearch()" class="bg-emerald-600 text-white px-6 py-3 rounded-[14px] font-black uppercase text-[10px]">Search</button>
            </div>

            <div id="results-area">
                <div class="text-center py-20 text-slate-300 font-bold uppercase italic text-sm">Search SR. NO to begin</div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwkBy_EzDFx6Xd_U7pE6Ud-jC9uL3tKiE",
        authDomain: "theeducator-37df7.firebaseapp.com",
        projectId: "theeducator-37df7",
        storageBucket: "theeducator-37df7.firebasestorage.app",
        messagingSenderId: "650246048269",
        appId: "1:650246048269:web:1f94bf4faaf142849aa344"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = "theeducator-37df7";

    const getCol = (name) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(name);

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }
    });

    async function handleLogin() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const email = u.includes('@') ? u : `${u}@school.com`;
        try { await auth.signInWithEmailAndPassword(email, p); } catch(e) { alert("Invalid Credentials"); }
    }

    function handleLogout() { auth.signOut(); }

    async function performSearch() {
        const id = document.getElementById('search-input').value.trim();
        if (!id) return;
        
        const resultsArea = document.getElementById('results-area');
        resultsArea.innerHTML = `<div class="text-center font-black py-10 uppercase animate-pulse text-xs text-slate-400">Fetching Data...</div>`;

        try {
            const doc = await getCol('contacts').doc(id).get();
            if (!doc.exists) {
                resultsArea.innerHTML = `<div class="text-center py-10 font-bold text-red-400 uppercase text-xs">ID Not Found</div>`;
                return;
            }

            const data = doc.data();
            const familyCode = data['FMLY #'] || data['search_family'] || "";
            
            let familyHtml = "";
            let familyMembers = [];
            if (familyCode) {
                const famSnap = await getCol('contacts').where('search_family', '==', familyCode.toString()).get();
                if (!famSnap.empty) {
                    familyHtml = `<div class="mt-6 mb-2 ml-2 font-black text-[10px] text-slate-400 uppercase tracking-widest italic">Family Details</div>`;
                    famSnap.forEach(fd => {
                        const fData = fd.data();
                        familyMembers.push(fData['STUDENT NAME']);
                        familyHtml += `
                            <div class="bg-white p-3 rounded-xl border border-slate-200 mb-2 flex justify-between items-center shadow-sm">
                                <div>
                                    <p class="text-[11px] font-black text-slate-800 uppercase">${fData['STUDENT NAME']}</p>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase">Class: ${fData['Class'] || 'N/A'}</p>
                                </div>
                                <div class="bg-blue-50 text-blue-600 text-[9px] font-black px-2 py-1 rounded">SR: ${fd.id}</div>
                            </div>
                        `;
                    });
                }
            }

            // Fetch call logs
            const logsSnap = await getCol('logs').where('student_id', '==', id).get();
            let logsHtml = "";
            if (!logsSnap.empty) {
                logsHtml = `<div class="mt-6 mb-2 ml-2 font-black text-[10px] text-slate-400 uppercase tracking-widest italic">Recent Remarks</div>`;
                const logs = logsSnap.docs.map(d => d.data()).sort((a,b) => b.timestamp - a.timestamp);
                logs.slice(0, 3).forEach(log => {
                    logsHtml += `
                        <div class="history-item">
                            <p class="text-[8px] font-black text-emerald-600 uppercase mb-1">${log.date} ${log.time}</p>
                            <p class="text-[11px] font-bold text-slate-700 italic leading-tight">"${log.remark}"</p>
                        </div>
                    `;
                });
            }

            renderDetails(data, id, familyHtml, logsHtml);
        } catch (e) {
            resultsArea.innerHTML = `<div class="text-center py-10 font-bold text-red-400 uppercase text-xs">Error Loading Data</div>`;
        }
    }

    function renderDetails(data, id, familyHtml, logsHtml) {
        const mob = data['MOBILE'] || data['Mobile No'] || 'N/A';
        const wa = data['WHATSAPP'] || mob;

        document.getElementById('results-area').innerHTML = `
            <div class="info-card mt-4 shadow-sm">
                <div class="info-row">
                    <div class="info-label">STUDENT NAME</div>
                    <div class="info-value"><span class="text-blue-900">${data['STUDENT NAME'] || 'N/A'}</span></div>
                </div>
                <div class="info-row">
                    <div class="info-label">FATHER NAME</div>
                    <div class="info-value"><span>${data['FATHER NAME'] || 'N/A'}</span></div>
                </div>
                <div class="info-row">
                    <div class="info-label">SR. NO / ID</div>
                    <div class="info-value"><span class="value-box">${id}</span></div>
                </div>
                <div class="info-row">
                    <div class="info-label">CLASS</div>
                    <div class="info-value"><span class="value-box">${data['Class'] || 'N/A'}</span></div>
                </div>
                <div class="info-row">
                    <div class="info-label">SECTION</div>
                    <div class="info-value"><span class="value-box">${data['Section'] || 'N/A'}</span></div>
                </div>
            </div>

            <div class="info-card shadow-sm">
                <div class="info-row">
                    <div class="info-label">MOBILE NO</div>
                    <div class="info-value"><span class="text-slate-600">${mob}</span></div>
                </div>
                <div class="info-row">
                    <div class="info-label">WHATSAPP</div>
                    <div class="info-value"><span class="text-slate-600">${wa}</span></div>
                </div>
            </div>

            <!-- Call Remark Input -->
            <div class="bg-white p-4 rounded-[24px] border border-slate-200 shadow-sm mb-4">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Add Call Remarks</p>
                <textarea id="remark-input" class="w-full bg-slate-50 rounded-xl p-3 text-xs font-bold border-none outline-none focus:ring-2 focus:ring-emerald-500 h-20" placeholder="Write remark here..."></textarea>
                <button onclick="saveRemark('${id}')" id="save-btn" class="w-full bg-slate-900 text-white py-3 rounded-xl mt-3 font-black uppercase text-[10px]">Save Remark</button>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-6">
                <a href="tel:${mob}" class="btn-call text-center py-4 rounded-2xl font-black text-[11px] uppercase shadow-lg active:scale-95 transition-transform">Call Now</a>
                <a href="https://wa.me/${wa.toString().replace(/\D/g,'')}" target="_blank" class="btn-wa text-center py-4 rounded-2xl font-black text-[11px] uppercase shadow-lg active:scale-95 transition-transform">WhatsApp</a>
            </div>

            ${logsHtml}
            ${familyHtml}
        `;
    }

    async function saveRemark(sid) {
        const text = document.getElementById('remark-input').value.trim();
        const btn = document.getElementById('save-btn');
        if (!text) return;

        const now = new Date();
        const payload = {
            student_id: sid,
            remark: text,
            date: now.toLocaleDateString(),
            time: now.toLocaleTimeString(),
            timestamp: now.getTime()
        };

        try {
            btn.innerText = "SAVING...";
            btn.disabled = true;
            await getCol('logs').add(payload);
            btn.innerText = "SAVED!";
            setTimeout(() => performSearch(), 1000);
        } catch(e) {
            btn.innerText = "RETRY";
            btn.disabled = false;
        }
    }

    async function downloadReport() {
        try {
            const [lSnap, cSnap] = await Promise.all([getCol('logs').get(), getCol('contacts').get()]);
            const sMap = new Map();
            cSnap.forEach(d => sMap.set(d.id, d.data()));

            // Extract family groupings
            const familyMap = new Map();
            cSnap.forEach(d => {
                const data = d.data();
                const fCode = data['FMLY #'] || data['search_family'] || "N/A";
                if (!familyMap.has(fCode)) familyMap.set(fCode, []);
                familyMap.get(fCode).push(data['STUDENT NAME']);
            });

            const rows = lSnap.docs.map(doc => {
                const l = doc.data();
                const s = sMap.get(l.student_id) || {};
                const fCode = s['FMLY #'] || s['search_family'] || "N/A";
                const familyNames = familyMap.get(fCode) ? familyMap.get(fCode).join(', ') : 'N/A';

                return {
                    "Date": l.date,
                    "Time": l.time,
                    "Student ID": l.student_id,
                    "Student Name": s['STUDENT NAME'] || 'N/A',
                    "Father Name": s['FATHER NAME'] || 'N/A',
                    "Mobile": s['MOBILE'] || s['Mobile No'] || 'N/A',
                    "Family Members": familyNames,
                    "Remarks": l.remark
                };
            }).sort((a,b) => new Date(b.Date + ' ' + b.Time) - new Date(a.Date + ' ' + a.Time));

            if (rows.length === 0) {
                alert("No history found to download.");
                return;
            }

            // Export to Excel
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "CallReport");
            XLSX.writeFile(wb, "The_Educators_Call_Report.xlsx");
        } catch (e) {
            console.error(e);
            alert("Error generating report.");
        }
    }
</script>
</body>
</html>
