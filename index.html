<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Educators</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: sans-serif; background:#f1f5f9; }
.toast { position:fixed; bottom:20px; right:20px; padding:10px; color:white; border-radius:10px; display:none; }
</style>
</head>

<body>

<div id="toast-msg" class="toast"></div>

<!-- LOGIN -->
<div id="login-screen" class="flex items-center justify-center h-screen bg-slate-900">
<div class="bg-white p-6 rounded-xl w-80">
<h2 class="text-xl font-bold mb-4 text-center">Admin Login</h2>

<input id="username" placeholder="Username" class="w-full p-2 border mb-2">
<input id="password" placeholder="Password" type="password" class="w-full p-2 border mb-3">

<button onclick="handleLogin()" class="w-full bg-green-600 text-white p-2 rounded">Login</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden p-5">
<div class="flex justify-between mb-4">
<h1 class="text-xl font-bold">Dashboard</h1>
<button onclick="handleLogout()" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
</div>

<div class="mb-4">
<input id="search-input" placeholder="Enter SR No" class="border p-2">
<button onclick="performSearch()" class="bg-black text-white px-3 py-2">Search</button>
</div>

<div id="results-area"></div>
</div>

<script>
// 🔥 FIREBASE (ONLY DATABASE)
const firebaseConfig = {
apiKey: "AIzaSyBwkBy_EzDFx6Xd_U7pE6Ud-jC9uL3tKiE",
authDomain: "theeducator-37df7.firebaseapp.com",
projectId: "theeducator-37df7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const getCol = (name) => db.collection('artifacts')
.doc('theeducator-37df7')
.collection('public')
.doc('data')
.collection(name);

// 🔥 USERS
const users = [
{ username: "rabia@123.com", password: "123" },
{ username: "admin@123.com", password: "123" }
];

// 🔥 AUTO LOGIN
window.onload = () => {
if(localStorage.getItem("isLoggedIn")==="true"){
showDashboard();
}
};

function showDashboard(){
document.getElementById('login-screen').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');
}

// 🔥 LOGIN FIXED
function handleLogin(){
const u = document.getElementById('username').value.trim().toLowerCase();
const p = document.getElementById('password').value.trim();

const found = users.find(x => 
x.username.toLowerCase() === u && x.password === p
);

if(found){
localStorage.setItem("isLoggedIn","true");
showDashboard();
showToast("Login Success","green");
}else{
showToast("Invalid Login","red");
}
}

// 🔥 LOGOUT
function handleLogout(){
localStorage.removeItem("isLoggedIn");
location.reload();
}

// 🔥 TOAST
function showToast(msg,color="black"){
const t=document.getElementById('toast-msg');
t.innerText=msg;
t.style.background=color;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

// 🔥 SEARCH
async function performSearch(){
const term=document.getElementById('search-input').value.trim();
const area=document.getElementById('results-area');

if(!term){
area.innerHTML="<p>Enter SR No</p>";
return;
}

area.innerHTML="Loading...";

try{
const doc=await getCol('contacts').doc(term).get();

if(!doc.exists){
area.innerHTML="<p style='color:red'>Not Found</p>";
return;
}

const d=doc.data();

area.innerHTML=`
<div style="background:white;padding:20px;border-radius:10px">
<h2><b>${d['STUDENT NAME']||'N/A'}</b></h2>
<p>Father: ${d['FATHER NAME']||''}</p>
<p>Class: ${d['Class']||''}</p>
</div>
`;
}catch(e){
area.innerHTML="Error";
}
}
</script>

</body>
</html>
