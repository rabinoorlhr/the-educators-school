<!DOCTYPE html>
<html>
<head>
  <title>Simple Educators System</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="bg-slate-100">

<!-- LOGIN -->
<div id="login" class="flex items-center justify-center h-screen">
  <div class="bg-white p-6 rounded-xl w-80 shadow">
    <h2 class="text-xl font-bold mb-4">Login</h2>

    <input id="email" placeholder="Email"
      class="w-full p-3 mb-3 border rounded normal-case">

    <input id="pass" type="password" placeholder="Password"
      class="w-full p-3 mb-3 border rounded">

    <button onclick="login()"
      class="w-full bg-green-600 text-white p-3 rounded">
      Login
    </button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="hidden p-6">

  <div class="flex justify-between mb-4">
    <h1 class="text-xl font-bold">Dashboard</h1>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
  </div>

  <!-- ADD -->
  <div class="bg-white p-4 rounded shadow mb-4">
    <input id="id" placeholder="SR No" class="border p-2 mr-2">
    <input id="name" placeholder="Name" class="border p-2 mr-2">
    <button onclick="add()" class="bg-blue-500 text-white px-3 py-2 rounded">Add</button>
  </div>

  <!-- LIST -->
  <div id="list" class="bg-white p-4 rounded shadow"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBwkBy_EzDFx6Xd_U7pE6Ud-jC9uL3tKiE",
  authDomain: "theeducator-37df7.firebaseapp.com",
  projectId: "theeducator-37df7"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("dash").classList.remove("hidden");
    load();
  } else {
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("dash").classList.add("hidden");
  }
});

function login(){
  const e = document.getElementById("email").value;
  const p = document.getElementById("pass").value;
  auth.signInWithEmailAndPassword(e,p)
    .catch(()=>alert("Login Failed"));
}

function logout(){
  auth.signOut();
}

async function add(){
  const id = document.getElementById("id").value;
  const name = document.getElementById("name").value;

  if(!id) return;

  await db.collection("contacts").doc(id).set({
    name: name
  });

  load();
}

async function load(){
  const snap = await db.collection("contacts").get();
  let html = "";

  snap.forEach(doc=>{
    html += `<div class="border p-2 mb-2">
      <b>${doc.id}</b> - ${doc.data().name || ''}
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}
</script>

</body>
</html>
