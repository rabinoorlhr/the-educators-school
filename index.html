<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee & Contact Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f3f4f6; }
        .detail-row { @apply flex justify-between items-center py-2 border-b border-gray-50 last:border-0; }
        .detail-label { @apply text-emerald-800 text-[10px] font-black uppercase tracking-wider text-left shrink-0; min-width: 120px; } 
        .detail-value { @apply text-blue-600 text-sm font-bold text-right break-words flex-1; }
        .stat-card { @apply bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center; }
        .history-item { @apply bg-slate-50 p-3 rounded-xl border-l-4 border-emerald-500 mb-2; }
    </style>
</head>
<body>

<div id="app" class="min-h-screen pb-20">
    <!-- Login Screen -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen bg-slate-900">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-slate-800">Admin Login</h2>
                <p class="text-slate-500 mt-2 italic">The Educator School System</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Email / Username" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition-all shadow-lg">Login</button>
                <p id="login-error" class="text-red-500 mt-2 text-sm text-center hidden"></p>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-700 p-2 rounded-lg text-white font-black text-xl italic">E</div>
                <h1 class="text-lg font-black text-slate-800 uppercase tracking-tighter">Educator Portal</h1>
            </div>
            <button onclick="handleLogout()" class="text-xs font-bold text-red-500 border border-red-100 px-3 py-1 rounded-full hover:bg-red-50">LOGOUT</button>
        </nav>

        <div class="container mx-auto p-4 lg:p-8 space-y-6">
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="stat-card">
                    <span class="text-[10px] font-black uppercase text-gray-400">Total Contacts</span>
                    <span id="count-contacts" class="text-2xl font-black text-blue-600">0</span>
                </div>
                <div class="stat-card">
                    <span class="text-[10px] font-black uppercase text-gray-400">Total Dues</span>
                    <span id="count-fees" class="text-2xl font-black text-emerald-600">0</span>
                </div>
                <div class="stat-card">
                    <span class="text-[10px] font-black uppercase text-gray-400">Total Call Logs</span>
                    <span id="count-logs" class="text-2xl font-black text-purple-600">0</span>
                </div>
                <div class="stat-card bg-slate-800 text-white shadow-lg">
                    <span class="text-[10px] font-black uppercase opacity-70">Download History</span>
                    <div class="flex gap-4 mt-2">
                        <button onclick="downloadReport('excel')" class="text-xs font-bold hover:text-emerald-400 transition-colors underline uppercase">Excel</button>
                        <button onclick="downloadReport('pdf')" class="text-xs font-bold hover:text-blue-400 transition-colors underline uppercase">PDF</button>
                    </div>
                </div>
            </div>

            <!-- Import Controls -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                <div>
                    <p class="text-[10px] font-black text-slate-400 mb-2 uppercase">1. Contacts Excel</p>
                    <input type="file" id="file-contacts" accept=".xlsx, .xls" class="block w-full text-xs text-slate-500 file:mr-2 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700">
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 mb-2 uppercase">2. Fees Excel</p>
                    <input type="file" id="file-fees" accept=".xlsx, .xls" class="block w-full text-xs text-slate-500 file:mr-2 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-emerald-50 file:text-emerald-700">
                </div>
                <div class="flex items-end">
                    <button onclick="confirmDeleteAll()" class="w-full bg-red-50 text-red-600 py-2.5 rounded-2xl text-[10px] font-black hover:bg-red-600 hover:text-white transition-all border border-red-100 uppercase tracking-widest">Clear Database</button>
                </div>
            </div>

            <!-- Search -->
            <div class="bg-white p-3 rounded-3xl shadow-md border border-gray-100">
                <div class="flex flex-col md:flex-row gap-2">
                    <input type="text" id="search-input" placeholder="Enter ID / SR / Family Code..." class="flex-1 p-4 bg-slate-50 border-none rounded-2xl focus:ring-4 focus:ring-emerald-100 outline-none font-bold text-slate-700">
                    <button onclick="performSearch()" class="bg-emerald-700 text-white px-8 py-4 rounded-2xl hover:bg-emerald-800 transition-all font-black uppercase tracking-widest text-sm shadow-xl">Search Now</button>
                </div>
            </div>

            <div id="records-container" class="grid grid-cols-1 gap-6"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwkBy_EzDFx6Xd_U7pE6Ud-jC9uL3tKiE",
        authDomain: "theeducator-37df7.firebaseapp.com",
        projectId: "theeducator-37df7",
        storageBucket: "theeducator-37df7.firebasestorage.app",
        messagingSenderId: "650246048269",
        appId: "1:650246048269:web:1f94bf4faaf142849aa344"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = "theeducator-37df7";

    const getCol = (name) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(name);

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            updateCounts();
            loadRecent();
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }
    });

    async function handleLogin() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const email = u.includes('@') ? u : `${u}@school.com`;
        try { await auth.signInWithEmailAndPassword(email, p); } catch(e) { document.getElementById('login-error').classList.remove('hidden'); }
    }

    function handleLogout() { auth.signOut(); }

    async function updateCounts() {
        try {
            const [c, f, l] = await Promise.all([getCol('contacts').get(), getCol('fees').get(), getCol('logs').get()]);
            document.getElementById('count-contacts').innerText = c.size;
            document.getElementById('count-fees').innerText = f.size;
            document.getElementById('count-logs').innerText = l.size;
        } catch(e) {}
    }

    async function loadRecent() {
        const cSnap = await getCol('contacts').limit(5).get();
        const fSnap = await getCol('fees').limit(5).get();
        renderRecords(cSnap, fSnap);
    }

    async function performSearch() {
        const term = document.getElementById('search-input').value.trim();
        if (!term) return;
        const container = document.getElementById('records-container');
        container.innerHTML = `<div class="text-center py-20 animate-pulse font-black text-slate-400">SEARCHING...</div>`;
        
        try {
            let famCode = term;
            const cTest = await getCol('contacts').doc(term).get();
            if (cTest.exists) famCode = cTest.data().search_family;
            else {
                const fTest = await getCol('fees').doc(term).get();
                if (fTest.exists) famCode = fTest.data().search_family;
            }

            const [cSnap, fSnap] = await Promise.all([
                getCol('contacts').where('search_family', '==', famCode.toString()).get(),
                getCol('fees').where('search_family', '==', famCode.toString()).get()
            ]);
            renderRecords(cSnap, fSnap);
        } catch(e) { container.innerHTML = `<p class="text-red-500 text-center font-bold">Search error occurred.</p>`; }
    }

    async function renderRecords(cSnap, fSnap) {
        const container = document.getElementById('records-container');
        const dataMap = new Map();
        
        cSnap.forEach(doc => dataMap.set(doc.id, { ...doc.data(), id: doc.id }));
        fSnap.forEach(doc => {
            const current = dataMap.get(doc.id) || {};
            dataMap.set(doc.id, { ...current, ...doc.data(), id: doc.id });
        });

        if (dataMap.size === 0) { container.innerHTML = `<p class="text-center text-slate-400 py-20 font-bold uppercase italic tracking-widest">No Records Found</p>`; return; }

        let html = "";
        for (let [id, data] of dataMap) {
            const logs = await getCol('logs').where('student_id', '==', id).get();
            const logItems = logs.docs.map(l => l.data()).sort((a,b) => b.timestamp - a.timestamp);
            
            const mobRaw = data['Mobile No'] || data['Mobile'] || data['CELL #'] || data['WHATSAPP'] || '0';
            const name = data['STUDENT NAME'] || data['Student Name'] || 'N/A';
            const balance = data['Final Balance'] || data['Dues'] || '0';

            html += `
            <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-gray-100 mb-6">
                <div class="bg-slate-900 p-5 flex justify-between items-center text-white">
                    <div class="flex gap-4">
                        <div class="text-center bg-emerald-600 px-3 py-1 rounded-xl">
                            <p class="text-[8px] font-black opacity-70">ID NO</p>
                            <p class="text-sm font-black">${id}</p>
                        </div>
                        <div class="text-center bg-blue-600 px-3 py-1 rounded-xl">
                            <p class="text-[8px] font-black opacity-70">FAMILY</p>
                            <p class="text-sm font-black">${data.search_family || 'N/A'}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-black text-emerald-400 uppercase italic">Active Record</p>
                    </div>
                </div>

                <div class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Info -->
                    <div class="space-y-4">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 border-b pb-2">Student Info</h4>
                        <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value uppercase">${name}</span></div>
                        <div class="detail-row"><span class="detail-label">Father</span><span class="detail-value uppercase">${data['FATHER NAME'] || 'N/A'}</span></div>
                        <div class="detail-row"><span class="detail-label">Class</span><span class="detail-value uppercase">${data.CLASS || 'N/A'}</span></div>
                        <div class="mt-4 flex gap-2">
                            <a href="tel:${mobRaw}" class="flex-1 bg-emerald-600 text-white text-center py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-emerald-700 transition-all">Call Now</a>
                            <a href="https://wa.me/${mobRaw.toString().replace(/\D/g,'')}" target="_blank" class="flex-1 bg-blue-600 text-white text-center py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-blue-700 transition-all">WhatsApp</a>
                        </div>
                    </div>

                    <!-- Finance -->
                    <div class="space-y-4">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 border-b pb-2">Fee Status</h4>
                        <div class="detail-row"><span class="detail-label">Arrears</span><span class="detail-value text-red-600">Rs. ${data['Fee Arrear'] || '0'}</span></div>
                        <div class="detail-row"><span class="detail-label">Fee</span><span class="detail-value">Rs. ${data['Actual Fee'] || '0'}</span></div>
                        <div class="detail-row"><span class="detail-label">Total Dues</span><span class="detail-value text-lg text-blue-800 font-black">Rs. ${balance}</span></div>
                    </div>

                    <!-- Logs & Interaction -->
                    <div class="space-y-4">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 border-b pb-2">Call Summary & History</h4>
                        <textarea id="log-text-${id}" placeholder="Aaj ki call details yahan likhein..." class="w-full h-24 bg-slate-50 rounded-2xl p-4 text-xs font-bold border-2 border-transparent focus:border-emerald-500 outline-none transition-all"></textarea>
                        <button onclick="saveCallLog('${id}')" id="btn-log-${id}" class="w-full bg-slate-900 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black transition-all">Save Remarks</button>
                        
                        <div class="mt-6">
                            <p class="text-[10px] font-black text-slate-400 mb-2 uppercase italic">Call History (${logItems.length})</p>
                            <div class="max-h-48 overflow-y-auto pr-2 space-y-2">
                                ${logItems.length > 0 ? logItems.map(log => `
                                    <div class="history-item">
                                        <div class="flex justify-between items-center mb-1">
                                            <span class="text-[8px] font-black text-emerald-700 uppercase">${log.date} @ ${log.time}</span>
                                        </div>
                                        <p class="text-[11px] font-bold text-slate-700 leading-tight italic">"${log.remark}"</p>
                                    </div>
                                `).join('') : '<p class="text-[10px] text-slate-400 font-bold italic">No history available.</p>'}
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    async function saveCallLog(sid) {
        const text = document.getElementById(`log-text-${sid}`).value.trim();
        const btn = document.getElementById(`btn-log-${sid}`);
        if (!text) return;

        const now = new Date();
        const payload = {
            student_id: sid,
            remark: text,
            date: now.toLocaleDateString(),
            time: now.toLocaleTimeString(),
            timestamp: now.getTime()
        };

        try {
            btn.innerText = "SAVING...";
            btn.disabled = true;
            await getCol('logs').add(payload);
            await getCol('contacts').doc(sid).set({ last_call: payload.date }, { merge: true });
            btn.innerText = "SAVED!";
            document.getElementById(`log-text-${sid}`).value = "";
            setTimeout(() => { performSearch(); updateCounts(); }, 1000);
        } catch(e) { alert("Save error!"); btn.innerText = "RETRY"; btn.disabled = false; }
    }

    async function handleImport(e, colName) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (evt) => {
            const wb = XLSX.read(evt.target.result, { type: 'binary' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const col = getCol(colName);
            for(let i=0; i<data.length; i+=100) {
                const batch = db.batch();
                data.slice(i, i+100).forEach(item => {
                    const id = (item['ID No.'] || item['SR. NO.'] || item['Student ID'] || item['ID NO'] || '').toString().trim();
                    const fCode = (item['Fmly Code'] || item['FMLY #'] || item['Family Code'] || '').toString().trim();
                    if(id) batch.set(col.doc(id), { ...item, search_family: fCode }, { merge: true });
                });
                await batch.commit();
            }
            alert("Upload Success!"); updateCounts();
        };
        reader.readAsBinaryString(file);
    }

    document.getElementById('file-contacts').addEventListener('change', (e) => handleImport(e, 'contacts'));
    document.getElementById('file-fees').addEventListener('change', (e) => handleImport(e, 'fees'));

    async function downloadReport(type) {
        const [lSnap, cSnap, fSnap] = await Promise.all([getCol('logs').get(), getCol('contacts').get(), getCol('fees').get()]);
        const sMap = new Map();
        cSnap.forEach(d => sMap.set(d.id, d.data()));
        fSnap.forEach(d => sMap.set(d.id, { ...(sMap.get(d.id)||{}), ...d.data() }));

        const rows = lSnap.docs.map(doc => {
            const l = doc.data();
            const s = sMap.get(l.student_id) || {};
            return {
                "Date": l.date,
                "Time": l.time,
                "Student ID": l.student_id,
                "Name": s['STUDENT NAME'] || s['Student Name'] || 'N/A',
                "Father": s['FATHER NAME'] || 'N/A',
                "Mobile": s['Mobile No'] || s['Mobile'] || 'N/A',
                "Remarks": l.remark,
                "Balance": s['Final Balance'] || '0'
            };
        }).sort((a,b) => new Date(b.Date + ' ' + b.Time) - new Date(a.Date + ' ' + a.Time));

        if (type === 'excel') {
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "CallReport");
            XLSX.writeFile(wb, "Full_Call_History.xlsx");
        } else {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'pt', 'a4');
            doc.autoTable({ head: [Object.keys(rows[0])], body: rows.map(r => Object.values(r)) });
            doc.save("Call_History_Report.pdf");
        }
    }

    async function confirmDeleteAll() {
        if (!confirm("Are you sure? This will delete ALL student and fee data!")) return;
        const pass = prompt("Type 'CONFIRM' to delete:");
        if (pass !== 'CONFIRM') return;
        const collections = ['contacts', 'fees', 'logs'];
        for(let name of collections) {
            const snap = await getCol(name).get();
            const batch = db.batch();
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
        }
        alert("Database Cleared!"); location.reload();
    }
</script>
</body>
</html>
