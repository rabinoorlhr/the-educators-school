<script>
    // Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyBwkBy_EzDFx6Xd_U7pE6Ud-jC9uL3tKiE",
        authDomain: "theeducator-37df7.firebaseapp.com",
        projectId: "theeducator-37df7",
        storageBucket: "theeducator-37df7.firebasestorage.app",
        messagingSenderId: "650246048269",
        appId: "1:650246048269:web:1f94bf4faaf142849aa344"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // FIXED PATH - Changed 'users' to 'families' based on your database structure
    const baseDoc = db.collection('artifacts').doc('the-educator-portal').collection('public').doc('data');
    const getCol = (name) => baseDoc.collection(name === 'contacts' ? 'families' : name);

    let isEditMode = false;

    function handleLogin() {
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value;

        if (u === "admin" && p === "123") {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            updateCounts();
            performSearch();
            showToast("Welcome Back!", "bg-emerald-600");
        } else {
            showToast("Ghalat Username ya Password!", "bg-red-500");
        }
    }

    function handleLogout() { window.location.reload(); }

    function showToast(msg, color = 'bg-slate-800') {
        const t = document.getElementById('toast-msg');
        t.innerText = msg;
        t.className = `toast ${color}`;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    async function updateCounts() {
        try {
            const today = new Date().toLocaleDateString();
            const yest = new Date();
            yest.setDate(yest.getDate() - 1);
            const yesterdayStr = yest.toLocaleDateString();

            const [c, l] = await Promise.all([getCol('contacts').get(), getCol('logs').get()]);
            let todayCount = 0; let yesterdayCount = 0;

            l.forEach(doc => {
                const log = doc.data();
                if(log.date === today) todayCount++;
                if(log.date === yesterdayStr) yesterdayCount++;
            });
            document.getElementById('count-contacts').innerText = c.size;
            document.getElementById('count-today').innerText = todayCount;
            document.getElementById('count-yesterday').innerText = yesterdayCount;
        } catch(e) { console.error("Count error", e); }
    }

    async function performSearch() {
        const term = document.getElementById('search-input').value.trim();
        const resultsArea = document.getElementById('results-area');
        resultsArea.innerHTML = `<div class="text-center py-20 font-black text-slate-300 animate-pulse text-xs uppercase tracking-widest">Searching Database...</div>`;
        
        try {
            if (!term) {
                const snap = await getCol('contacts').limit(30).get();
                let html = `<div class="list-container shadow-sm overflow-hidden">
                    <div class="p-4 border-b bg-slate-50 flex justify-between items-center"><h3 class="text-[10px] font-black uppercase text-slate-400">Recent Students</h3></div>
                    <div class="overflow-x-auto"><table><thead><tr><th>SR NO</th><th>Name</th><th>Father</th><th>Class/Sec</th><th>Family Code</th></tr></thead><tbody>`;
                
                snap.forEach(doc => {
                    const d = doc.data();
                    // Handling case-sensitivity for studentName, fatherName etc.
                    const sName = d.studentName || d['STUDENT NAME'] || d['Student Name'] || 'N/A';
                    const fName = d.fatherName || d['FATHER NAME'] || d['Father Name'] || 'N/A';
                    const cls = d.classSection || d['Class'] || 'N/A';
                    const fml = d.familyCode || d.search_family || d['FMLY #'] || 'N/A';

                    html += `<tr class="hover:bg-slate-50 cursor-pointer" onclick="viewStudent('${doc.id}')">
                        <td class="text-emerald-600 font-black">${doc.id}</td>
                        <td class="uppercase">${sName}</td>
                        <td class="uppercase text-slate-500">${fName}</td>
                        <td class="uppercase">${cls}</td>
                        <td class="text-blue-600 font-bold">${fml}</td>
                    </tr>`;
                });
                html += `</tbody></table></div></div>`;
                resultsArea.innerHTML = html;
            } else {
                const docRef = await getCol('contacts').doc(term).get();
                if (!docRef.exists) {
                    resultsArea.innerHTML = `<div class="text-center py-20 text-red-400 font-black uppercase text-xs">SR No "${term}" Not Found</div>`;
                    return;
                }
                const student = docRef.data();
                const familyCode = (student.familyCode || student.search_family || student['Fmly Code'] || student['FMLY #'] || "").toString();
                const logsSnap = await getCol('logs').where('student_id', '==', docRef.id).get();
                const logs = logsSnap.docs.map(d => d.data()).sort((a,b) => b.timestamp - a.timestamp);
                
                let others = [];
                if (familyCode) {
                    // Optimized search for siblings
                    const famSnap = await getCol('contacts').where('familyCode', '==', familyCode).get();
                    famSnap.forEach(d => { if(d.id !== docRef.id) others.push({ id: d.id, ...d.data() }); });
                }
                resultsArea.innerHTML = renderDetailedCard(docRef.id, student, logs, others, familyCode);
            }
        } catch (e) { 
            console.error(e);
            resultsArea.innerHTML = `<div class="text-center py-20 text-red-500 font-black">Error: Check Rules & Structure.</div>`; 
        }
    }

    function viewStudent(id) { document.getElementById('search-input').value = id; performSearch(); }

    function openAddModal() {
        isEditMode = false;
        document.getElementById('modal-title').innerText = "Add New Student";
        document.getElementById('sr-field-container').classList.remove('hidden');
        document.getElementById('edit-id').value = '';
        document.getElementById('edit-sr').value = '';
        document.getElementById('edit-name').value = '';
        document.getElementById('edit-father').value = '';
        document.getElementById('edit-class').value = '';
        document.getElementById('edit-section').value = '';
        document.getElementById('edit-mobile').value = '';
        document.getElementById('edit-whatsapp').value = '';
        document.getElementById('edit-fml').value = '';
        document.getElementById('student-modal').classList.remove('hidden');
    }

    function openEditModal(id, currentData) {
        isEditMode = true;
        document.getElementById('modal-title').innerText = "Edit Student Profile";
        document.getElementById('sr-field-container').classList.add('hidden');
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-name').value = currentData.studentName || currentData['STUDENT NAME'] || '';
        document.getElementById('edit-father').value = currentData.fatherName || currentData['FATHER NAME'] || '';
        document.getElementById('edit-class').value = currentData.classSection || currentData['Class'] || '';
        document.getElementById('edit-mobile').value = currentData.mobileNumber || currentData['MOBILE'] || '';
        document.getElementById('edit-whatsapp').value = currentData.whatsappNumber || currentData['WHATSAPP'] || '';
        document.getElementById('edit-fml').value = currentData.familyCode || currentData.search_family || '';
        document.getElementById('student-modal').classList.remove('hidden');
    }

    async function saveStudent() {
        const srNo = document.getElementById('edit-sr').value.trim();
        const studentId = isEditMode ? document.getElementById('edit-id').value : srNo;
        if (!studentId) { showToast("SR No is required", "bg-amber-600"); return; }
        
        // Payload adjusted to match your Firestore field names (camelCase)
        const payload = {
            'studentName': document.getElementById('edit-name').value.trim(),
            'fatherName': document.getElementById('edit-father').value.trim(),
            'classSection': document.getElementById('edit-class').value.trim(),
            'mobileNumber': document.getElementById('edit-mobile').value.trim(),
            'whatsappNumber': document.getElementById('edit-whatsapp').value.trim(),
            'familyCode': document.getElementById('edit-fml').value.trim(),
        };

        try {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Processing..."; btn.disabled = true;
            if (!isEditMode) {
                const check = await getCol('contacts').doc(studentId).get();
                if (check.exists) {
                    document.getElementById('dup-warning').classList.remove('hidden');
                    btn.innerText = "Save Details"; btn.disabled = false; return;
                }
                await getCol('contacts').doc(studentId).set(payload);
                showToast("Student Added", "bg-emerald-600");
            } else {
                await getCol('contacts').doc(studentId).update(payload);
                showToast("Updated", "bg-blue-600");
            }
            closeModal(); performSearch(); updateCounts();
            btn.innerText = "Save Details"; btn.disabled = false;
        } catch(e) { showToast("Error Saving", "bg-red-500"); }
    }

    function renderDetailedCard(id, data, logs, family, fCode) {
        const sName = data.studentName || data['STUDENT NAME'] || 'N/A';
        const fName = data.fatherName || data['FATHER NAME'] || 'N/A';
        const mob = data.mobileNumber || data['MOBILE'] || 'N/A';
        const wa = data.whatsappNumber || data['WHATSAPP'] || mob;
        
        let logsHtml = logs.slice(0, 3).map(l => `
            <div class="history-item">
                <p class="text-[7px] font-black text-emerald-600 uppercase">${l.date} ${l.time}</p>
                <p class="text-[10px] font-bold text-slate-600">"${l.remark}"</p>
            </div>
        `).join('');

        let familyHtml = family.map(m => `
            <tr class="hover:bg-slate-50 cursor-pointer" onclick="viewStudent('${m.id}')">
                <td class="font-bold text-blue-600">${m.id}</td>
                <td class="uppercase">${m.studentName || 'N/A'}</td>
                <td class="uppercase text-slate-500">${m.fatherName || 'N/A'}</td>
                <td class="uppercase text-xs">${m.classSection || 'N/A'}</td>
                <td class="font-bold">${m.mobileNumber || 'N/A'}</td>
            </tr>
        `).join('');

        return `
            <div class="space-y-6">
                <div class="info-card overflow-hidden">
                    <div class="bg-slate-900 p-6 flex justify-between items-center text-white">
                        <div>
                            <p class="text-[9px] font-black opacity-50 uppercase tracking-widest">Profile View</p>
                            <h2 class="text-xl font-black uppercase tracking-tight">${sName}</h2>
                            <p class="text-xs font-bold text-emerald-400 mt-1 uppercase italic">${fName}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <span class="bg-emerald-600 text-white text-xs font-black px-4 py-2 rounded-xl">SR: ${id}</span>
                            <button onclick='openEditModal("${id}", ${JSON.stringify(data).replace(/'/g, "&apos;")})' class="text-[9px] font-black uppercase text-slate-400 border border-slate-700 px-3 py-1 rounded-lg">Edit</button>
                        </div>
                    </div>
                    <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div><p class="detail-label">Class/Section</p><p class="detail-value">${data.classSection || 'N/A'}</p></div>
                                <div><p class="detail-label">Family Code</p><p class="detail-value">${data.familyCode || 'N/A'}</p></div>
                                <div><p class="detail-label">Mobile</p><p class="detail-value">${mob}</p></div>
                                <div><p class="detail-label">WhatsApp</p><p class="detail-value">${wa}</p></div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 pt-4">
                                <a href="tel:${mob}" class="bg-emerald-600 text-white text-center py-4 rounded-2xl font-black text-[10px] uppercase">Call</a>
                                <a href="https://wa.me/${wa.toString().replace(/\D/g,'')}" target="_blank" class="bg-slate-800 text-white text-center py-4 rounded-2xl font-black text-[10px] uppercase">WhatsApp</a>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-5 rounded-[2rem] border border-slate-100">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-3 tracking-widest">Add Call Remark</p>
                            <textarea id="rem-${id}" placeholder="Enter summary..." class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-xs font-bold h-24 outline-none"></textarea>
                            <button onclick="saveRemark('${id}')" id="btn-${id}" class="w-full bg-blue-600 text-white py-4 mt-3 rounded-2xl font-black uppercase text-[10px]">Save Log</button>
                        </div>
                    </div>
                </div>
                <div class="list-container">
                    <div class="bg-blue-50 p-4 border-b border-blue-100"><h3 class="text-[10px] font-black uppercase text-blue-800">Family Members</h3></div>
                    <div class="overflow-x-auto"><table><thead><tr><th>ID</th><th>Name</th><th>Father</th><th>Class/Sec</th><th>Contact</th></tr></thead><tbody>${familyHtml || '<tr><td colspan="5" class="text-center py-6">No Siblings found.</td></tr>'}</tbody></table></div>
                </div>
            </div>`;
    }

    async function saveRemark(sid) {
        const text = document.getElementById(`rem-${sid}`).value.trim();
        const btn = document.getElementById(`btn-${sid}`);
        if (!text) return;
        const now = new Date();
        try {
            btn.innerText = "Saving..."; btn.disabled = true;
            await getCol('logs').add({ student_id: sid, remark: text, date: now.toLocaleDateString(), time: now.toLocaleTimeString(), timestamp: now.getTime() });
            btn.innerText = "Saved!";
            setTimeout(() => { performSearch(); updateCounts(); }, 800);
        } catch(e) { btn.innerText = "Error"; btn.disabled = false; }
    }

    // Modal close function
    function closeModal() { document.getElementById('student-modal').classList.add('hidden'); }

    // Export & Backup functions remain the same but use updated fields
    // ... (rest of your backup/import functions)
</script>
